name: Release Build

on:
  release:
    types: [published]
  push:
    branches: [preview, rebuild]

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_upload: ${{ steps.version.outputs.should_upload }}
    steps:
      - name: Determine version and upload target
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
            echo "should_upload=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "rebuild" ]; then
            # Get latest release tag
            LATEST=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName')
            echo "version=${LATEST}" >> $GITHUB_OUTPUT
            echo "should_upload=true" >> $GITHUB_OUTPUT
          else
            echo "version=preview" >> $GITHUB_OUTPUT
            echo "should_upload=false" >> $GITHUB_OUTPUT
          fi

  build-windows:
    needs: [resolve-version]
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NSIS
        run: |
          choco install nsis -y
          # Add NSIS to PATH for current session
          $env:Path += ";C:\Program Files (x86)\NSIS"
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Ensure MinGW build tools
        run: |
          # Windows runners have MinGW gcc at C:\mingw64\bin and CMake pre-installed.
          # Just ensure ninja is available (install via choco if missing).
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y
          }
          Write-Host "gcc:   $((Get-Command gcc).Source)"
          Write-Host "g++:   $((Get-Command g++).Source)"
          Write-Host "cmake: $((Get-Command cmake).Source)"
          Write-Host "ninja: $((Get-Command ninja).Source)"
        shell: pwsh

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build CLI application
        run: |
          if (-not (Test-Path "build/bin")) {
            New-Item -ItemType Directory -Path "build/bin" | Out-Null
          }
          go build -tags cli -o "build/bin/nstudio-cli-${{ needs.resolve-version.outputs.version }}-Windows.exe" .
        shell: pwsh

      - name: Prepare CLI for NSIS installer
        run: |
          # Copy CLI to installer directory so NSIS can include it
          Copy-Item -Path "build/bin/nstudio-cli-${{ needs.resolve-version.outputs.version }}-Windows.exe" -Destination "build/windows/installer/nstudio-cli.exe"
        shell: pwsh

      - name: Build piper native DLLs
        run: .\scripts\build-libpiper.ps1
        shell: pwsh

      - name: Save piper native files before clean build
        run: |
          # wails build -clean wipes build/bin/, including the piper DLLs that
          # NSIS needs. Stash them in a temp dir and restore after the clean build.
          $stash = Join-Path $env:RUNNER_TEMP "piper-native"
          New-Item -ItemType Directory -Force -Path $stash | Out-Null
          foreach ($name in @("libpiper.dll", "onnxruntime.dll", "onnxruntime_providers_shared.dll", "libpiper_directml.dll", "DirectML.dll")) {
            $src = Join-Path "build\bin" $name
            if (Test-Path $src) { Copy-Item $src -Destination $stash -Force }
          }
          if (Test-Path "build\bin\espeak-ng-data") {
            Copy-Item "build\bin\espeak-ng-data" -Destination $stash -Recurse -Force
          }
          Get-ChildItem $stash | ForEach-Object { Write-Host "  stashed: $($_.Name)" }
        shell: pwsh

      - name: Build GUI application (no installer yet)
        run: wails build -clean -platform windows/amd64

      - name: Restore piper native files into build/bin
        run: |
          $stash = Join-Path $env:RUNNER_TEMP "piper-native"
          if (-not (Test-Path $stash)) {
            Write-Error "Stash directory missing: $stash"
            exit 1
          }
          Copy-Item (Join-Path $stash "*") -Destination "build\bin" -Recurse -Force
          # Sanity-check that NSIS's required files are now in place.
          foreach ($required in @("libpiper.dll", "onnxruntime.dll", "onnxruntime_providers_shared.dll", "espeak-ng-data")) {
            $path = Join-Path "build\bin" $required
            if (-not (Test-Path $path)) {
              Write-Error "Missing after restore: $path"
              exit 1
            }
          }
        shell: pwsh

      - name: Build NSIS installer
        run: |
          $exe = Resolve-Path "build\bin\narration_studio.exe"
          Push-Location "build\windows\installer"
          try {
            makensis "/DARG_WAILS_AMD64_BINARY=$($exe.Path)" project.nsi
            if ($LASTEXITCODE -ne 0) {
              Write-Error "makensis failed with exit code $LASTEXITCODE"
              exit 1
            }
          } finally {
            Pop-Location
          }
        shell: pwsh

      - name: Prepare artifacts
        run: |
          # Copy engine dependencies for installer context
          Copy-Item -Path "build/windows/installer/engines" -Destination "build/bin/engines" -Recurse -Force
          # Restore CLI executable (removed by -clean flag during GUI build)
          Copy-Item -Path "build/windows/installer/nstudio-cli.exe" -Destination "build/bin/nstudio-cli-${{ needs.resolve-version.outputs.version }}-Windows.exe"
          # Rename installer to include version
          $installer = Get-ChildItem -Path "build/bin" -Filter "*installer.exe" | Select-Object -First 1
          if ($installer) {
            Rename-Item $installer.FullName "Narration-Studio-${{ needs.resolve-version.outputs.version }}-Windows-Installer.exe"
          }
        shell: pwsh

      - name: Upload Windows Installer
        if: needs.resolve-version.outputs.should_upload == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem -Path "build/bin" -Filter "Narration-Studio-*-Windows-Installer.exe" | Select-Object -First 1
          if ($installer) {
            gh release upload ${{ needs.resolve-version.outputs.version }} $installer.FullName --clobber
          } else {
            Write-Host "ERROR: Installer not found in build/bin"
            exit 1
          }
        shell: pwsh

      - name: Upload Windows CLI
        if: needs.resolve-version.outputs.should_upload == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.resolve-version.outputs.version }} "build/bin/nstudio-cli-${{ needs.resolve-version.outputs.version }}-Windows.exe" --clobber
        shell: pwsh

  build-windows-dll:
    needs: [resolve-version]
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Ensure MinGW build tools
        run: |
          # Windows runners have MinGW gcc at C:\mingw64\bin and CMake pre-installed.
          # Just ensure ninja is available (install via choco if missing).
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y
          }
          Write-Host "gcc:   $((Get-Command gcc).Source)"
          Write-Host "g++:   $((Get-Command g++).Source)"
          Write-Host "cmake: $((Get-Command cmake).Source)"
          Write-Host "ninja: $((Get-Command ninja).Source)"
        shell: pwsh

      - name: Build piper native DLLs
        run: .\scripts\build-libpiper.ps1
        shell: pwsh

      - name: Build nstudio DLL bundle
        run: .\scripts\build-dll.ps1 -Clean
        shell: pwsh

      - name: Package DLL zip
        run: |
          $zipName = "Narration-Studio-${{ needs.resolve-version.outputs.version }}-Windows-DLL.zip"
          $outDir = "build\bin\dll"
          if (-not (Test-Path $outDir)) {
            Write-Error "DLL output directory not found: $outDir"
            exit 1
          }
          Compress-Archive -Path "$outDir\*" -DestinationPath "build\bin\$zipName" -Force
          Write-Host "Created: build\bin\$zipName"
          Get-ChildItem "build\bin\$zipName" | Select-Object Name, Length
        shell: pwsh

      - name: Upload DLL zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: nstudio-dll-${{ needs.resolve-version.outputs.version }}
          path: build/bin/Narration-Studio-${{ needs.resolve-version.outputs.version }}-Windows-DLL.zip
          if-no-files-found: error

      - name: Upload DLL zip to release
        if: needs.resolve-version.outputs.should_upload == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.resolve-version.outputs.version }} "build/bin/Narration-Studio-${{ needs.resolve-version.outputs.version }}-Windows-DLL.zip" --clobber
        shell: pwsh

  build-macos:
    needs: [resolve-version]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build GUI application
        run: wails build -clean -platform darwin/universal

      - name: Build CLI application
        run: |
          mkdir -p build/bin
          go build -tags cli -o "build/bin/nstudio-cli-${{ needs.resolve-version.outputs.version }}-OSX" .

      - name: Embed CLI and Package macOS GUI
        run: |
          cd build/bin

          # Find the app bundle
          if [ -d "Narration Studio.app" ]; then
            APP_NAME="Narration Studio.app"
          elif [ -d "narration_studio.app" ]; then
            APP_NAME="narration_studio.app"
          else
            echo "App bundle not found!"
            exit 1
          fi

          # Embed CLI
          echo "Embedding CLI into $APP_NAME..."
          cp "nstudio-cli-${{ needs.resolve-version.outputs.version }}-OSX" "$APP_NAME/Contents/MacOS/"

          # Zip it with the versioned name
          zip -r "Narration-Studio-${{ needs.resolve-version.outputs.version }}-OSX.zip" "$APP_NAME"

      - name: Upload macOS GUI
        if: needs.resolve-version.outputs.should_upload == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd build/bin
          gh release upload ${{ needs.resolve-version.outputs.version }} "Narration-Studio-${{ needs.resolve-version.outputs.version }}-OSX.zip" --clobber

      - name: Upload macOS CLI
        if: needs.resolve-version.outputs.should_upload == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.resolve-version.outputs.version }} "build/bin/nstudio-cli-${{ needs.resolve-version.outputs.version }}-OSX" --clobber

  build-linux-gui-webkit40:
    needs: [resolve-version]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libgtk-3-dev libwebkit2gtk-4.0-dev libasound2-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build piper native .so
        run: chmod +x scripts/build-libpiper.sh && ./scripts/build-libpiper.sh

      - name: Save piper native files before clean build
        run: |
          mkdir -p /tmp/piper-native
          cp build/bin/libpiper.so /tmp/piper-native/
          cp -r build/bin/espeak-ng-data /tmp/piper-native/
          find build/bin -name 'libonnxruntime*.so*' -exec cp {} /tmp/piper-native/ \;

      - name: Build GUI (webkit2gtk 4.0)
        run: wails build -clean -platform linux/amd64

      - name: Package GUI zip (WebKit 4.0)
        run: |
          mkdir -p staging
          cp build/bin/narration_studio staging/
          cp /tmp/piper-native/libpiper.so staging/
          cp -r /tmp/piper-native/espeak-ng-data staging/
          find /tmp/piper-native -name 'libonnxruntime*.so*' -exec cp {} staging/ \;
          cd staging && zip -r "../Narration-Studio-${{ needs.resolve-version.outputs.version }}-Linux-WebKit-4.0.zip" .

      - name: Upload GUI zip (WebKit 4.0)
        if: needs.resolve-version.outputs.should_upload == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.resolve-version.outputs.version }} "Narration-Studio-${{ needs.resolve-version.outputs.version }}-Linux-WebKit-4.0.zip" --clobber

  build-linux-gui-webkit41:
    needs: [resolve-version]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libgtk-3-dev libwebkit2gtk-4.1-dev libasound2-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build piper native .so
        run: chmod +x scripts/build-libpiper.sh && ./scripts/build-libpiper.sh

      - name: Save piper native files before clean build
        run: |
          mkdir -p /tmp/piper-native
          cp build/bin/libpiper.so /tmp/piper-native/
          cp -r build/bin/espeak-ng-data /tmp/piper-native/
          find build/bin -name 'libonnxruntime*.so*' -exec cp {} /tmp/piper-native/ \;

      - name: Build GUI (webkit2gtk 4.1)
        run: wails build -clean -platform linux/amd64 -tags webkit2_41

      - name: Package GUI zip (WebKit 4.1)
        run: |
          mkdir -p staging
          cp build/bin/narration_studio staging/
          cp /tmp/piper-native/libpiper.so staging/
          cp -r /tmp/piper-native/espeak-ng-data staging/
          find /tmp/piper-native -name 'libonnxruntime*.so*' -exec cp {} staging/ \;
          cd staging && zip -r "../Narration-Studio-${{ needs.resolve-version.outputs.version }}-Linux-WebKit-4.1.zip" .

      - name: Upload GUI zip (WebKit 4.1)
        if: needs.resolve-version.outputs.should_upload == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.resolve-version.outputs.version }} "Narration-Studio-${{ needs.resolve-version.outputs.version }}-Linux-WebKit-4.1.zip" --clobber

  build-linux-cli:
    needs: [resolve-version]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libasound2-dev libasound-dev 2>/dev/null || sudo apt-get install -y build-essential pkg-config libasound-dev

      - name: Build CLI application
        run: |
          mkdir -p build/bin
          CGO_LDFLAGS="-L/usr/lib/x86_64-linux-gnu" go build -tags cli -o "build/bin/nstudio-cli-${{ needs.resolve-version.outputs.version }}-Linux" .

      - name: Upload Linux CLI
        if: needs.resolve-version.outputs.should_upload == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.resolve-version.outputs.version }} "build/bin/nstudio-cli-${{ needs.resolve-version.outputs.version }}-Linux" --clobber
